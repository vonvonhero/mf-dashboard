name: Crawler E2E Tests

on:
  schedule:
    # JST 12:00 (UTC 03:00)
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: "e2e-crawler"
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          OP_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SHOULD_RUN: ${{ vars.SHOULD_RUN_CRAWLER_E2E }}
        run: echo "should-run=${{ env.OP_TOKEN != '' && env.SHOULD_RUN == 'true' }}" >> "$GITHUB_OUTPUT"
  e2e:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/auth-state-cache
        with:
          mode: restore
          enabled: ${{ vars.CACHE_AUTH_STATE }}
      - name: Run e2e tests
        run: pnpm --filter @mf-dashboard/crawler test:e2e
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT: ${{ secrets.OP_VAULT }}
          OP_ITEM: ${{ secrets.OP_ITEM }}
          OP_TOTP_FIELD: ${{ secrets.OP_TOTP_FIELD }}
      - uses: ./.github/actions/auth-state-cache
        if: always()
        with:
          mode: save
          enabled: ${{ vars.CACHE_AUTH_STATE }}
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots
          path: apps/crawler/tests/e2e/screenshots/
          if-no-files-found: ignore
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "🔴 Crawler E2E テストが失敗しました"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *🔴 Crawler E2E テストが失敗しました*

                    <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|ワークフローを確認>
      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_AVATAR_URL: ${{ secrets.DISCORD_AVATAR_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n --arg run_url "$RUN_URL" --arg avatar_url "${DISCORD_AVATAR_URL:-}" '
            if ($avatar_url | length) > 0 then
              {content: "🔴 Crawler E2E テストが失敗しました\n\($run_url)", avatar_url: $avatar_url}
            else
              {content: "🔴 Crawler E2E テストが失敗しました\n\($run_url)"}
            end
          ')

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
